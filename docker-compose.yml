services:
  rtmp:
    build: .
    container_name: dji-rtmp
    ports:
      - "1935:1935"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  ffmpeg:
    build:
      context: .
      dockerfile: Dockerfile.ffmpeg
    container_name: ffmpeg-repair
    depends_on:
      - rtmp
    restart: unless-stopped
