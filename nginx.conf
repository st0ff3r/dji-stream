error_log /dev/stdout info;

events {
	worker_connections 1024;
}

rtmp {
	server {
		listen 1935;
		chunk_size 4000;

		# -------------------------
		# RAW DJI INPUT STREAM
		# -------------------------
		application drone {
			live on;
			record off;

			# HLS (RAW DEBUG STREAM)
			hls on;
			hls_path /opt/data/hls/drone;
			hls_fragment 2;
			hls_playlist_length 10;
			hls_nested on;
			hls_cleanup on;
		}

		# -------------------------
		# PROCESSED OUTPUT STREAM (FFmpeg)
		# -------------------------
		application ffmpeg {
			live on;
			record off;

			# HLS (CLEAN STREAM)
			hls on;
			hls_path /opt/data/hls/ffmpeg;
			hls_fragment 2;
			hls_playlist_length 10;
			hls_nested on;
			hls_cleanup on;
		}
	}
}

http {
	server {
		listen 80;

		# -------------------------
		# RAW HLS (optional debug)
		# -------------------------
		location /drone {
			types {
				application/vnd.apple.mpegurl m3u8;
				video/mp2t ts;
			}

			alias /opt/data/hls/drone/index.m3u8;

			add_header Cache-Control no-cache;
			add_header Access-Control-Allow-Origin *;
		}

		# -------------------------
		# PROCESSED HLS (main view)
		# -------------------------
		location /ffmpeg {
			types {
				application/vnd.apple.mpegurl m3u8;
				video/mp2t ts;
			}

			alias /opt/data/hls/ffmpeg/index.m3u8;

			add_header Cache-Control no-cache;
			add_header Access-Control-Allow-Origin *;
		}

		# -------------------------
		# HEALTH CHECK
		# -------------------------
		location / {
			return 200 "RTMP + HLS server running\n";
		}
	}
}
